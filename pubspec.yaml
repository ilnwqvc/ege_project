name: ege_russian_app
description: Mobile app for preparing for the Russian Unified State Exam.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  go_router: ^14.8.1
  http: ^1.2.2
  provider: ^6.1.2
  sqlite3: ^3.3.1

dev_dependencies:
  build_runner: ^2.5.4
  drift_dev: ^2.32.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/content/packages/
    - assets/content/manifest.json
